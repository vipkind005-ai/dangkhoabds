                    if (!internalInfo || typeof internalInfo !== 'string') return "";
                    const addressMatch = internalInfo.match(/(?:ĐC|Địa chỉ):\s*(.*?)(?=\n|$)/i);
                    const districtMatch = internalInfo.match(/(?:Phường \/ Quận|Quận|Khu vực):\s*(.*?)(?=\n|$)/i);

                    const address = addressMatch ? addressMatch[1].trim() : "";
                    const district = districtMatch ? districtMatch[1].trim() : "";
                    return [address, district, "Hồ Chí Minh, Việt Nam"].filter(Boolean).join(", ");
                };

                    if (!destination) { showToast("⚠️ Không tìm thấy địa chỉ trong Thông tin nội bộ!"); return; }

                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                const { latitude, longitude } = position.coords;
                                window.open(`https://www.google.com/maps/dir/?api=1&origin=${latitude},${longitude}&destination=${encodedDest}`, '_blank');
                            },
                            (error) => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodedDest}`, '_blank'); }
                        );
                    } else {
                        window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodedDest}`, '_blank');
                    }
                };

                const handleSurveyImageUpload = async (e) => {
                    const files = Array.from(e.target.files);
                    if (!files.length) return;
                    showToast('⏳ Đang nén ảnh khảo sát...');
                    const newImagesBase64 = await Promise.all(files.map(compressImage));

                    setSurveyModal(prev => ({
                        ...prev,
                        post: { ...prev.post, surveyImages: [...(prev.post.surveyImages || []), ...newImagesBase64] }
                    }));
                };

                const removeSurveyImage = (indexToRemove) => {
                    setSurveyModal(prev => ({
                        ...prev,
                        post: { ...prev.post, surveyImages: prev.post.surveyImages.filter((_, index) => index !== indexToRemove) }
                    }));
                };

                const handleSaveSurvey = async () => {
                    const post = surveyModal.post;
                    if (!post) return;
                    showToast('⏳ Đang lưu dữ liệu khảo sát...');

                    let finalSurveyImages = [];
                    for (let i = 0; i < (post.surveyImages || []).length; i++) {
                        const imgData = post.surveyImages[i];
                        if (imgData.startsWith('data:image')) {
                            if (IMGBB_API_KEY) {
                                try {
                                    const form = new FormData(); form.append('image', imgData.split(',')[1]);
                                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: form });
                                    const data = await res.json();
                                    if (data.success) { finalSurveyImages.push(data.data.url); } else finalSurveyImages.push(imgData);
                                } catch(e) { finalSurveyImages.push(imgData); }
                            } else { finalSurveyImages.push(imgData); }
                        } else { finalSurveyImages.push(imgData); }
                    }

                    const updatedPost = { ...post, surveyImages: finalSurveyImages };
                    const api = window.FirebaseAPI || {};

                    if (user && db && api.setDoc) {
                        try {
                            await api.setDoc(api.doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id.toString()), updatedPost);
                            showToast('✅ Đã lưu kết quả khảo sát!');
                        } catch (e) { showToast('❌ Lỗi lưu dữ liệu!'); }
                    } else {
                        setPosts(prev => prev.map(p => p.id === post.id ? updatedPost : p));
                        showToast('✅ Đã lưu khảo sát (cục bộ)!');
                    }
                    setSurveyModal({ show: false, post: null });
                };

                const openImageEditor = (index) => {
                    const url = formData.imageUrls[index];
                    if (!url.startsWith('data:image')) {
                        showToast('🔄 Đang tải ảnh gốc từ hệ thống để chỉnh sửa...');
                        fetch(url)
                            .then(res => res.blob())
                            .then(blob => {
                                const reader = new FileReader();
                                reader.onloadend = () => { setImageEditorModal({ show: true, index: index, originalUrl: reader.result, currentUrl: reader.result, watermarkText: '0935.210.212' }); }
                                reader.readAsDataURL(blob);
                            }).catch(() => { showToast('❌ Trình duyệt chặn tải ảnh chéo domain. Hãy thao tác với ảnh vừa up từ máy tính!'); });
                        return;
                    }
                    setImageEditorModal({ show: true, index: index, originalUrl: url, currentUrl: url, watermarkText: '0935.210.212 - Đăng Khoa' });
                };

                const handleApplyImageProcess = (type) => {
                    showToast('⏳ Đang áp dụng hiệu ứng...');
                    const img = new Image(); img.crossOrigin = "anonymous";
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        if (type === 'enhance') { ctx.filter = 'brightness(1.1) contrast(1.15) saturate(1.2)'; }
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height); ctx.filter = 'none';
                        if (type === 'watermark') {
                            const text = imageEditorModal.watermarkText;
                            if (text) {
                                const fontSize = Math.max(24, Math.floor(canvas.width * 0.04));
                                ctx.font = `bold ${fontSize}px sans-serif`; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
                                const padding = Math.floor(canvas.width * 0.03); const x = canvas.width - padding; const y = canvas.height - padding;
                                ctx.lineWidth = Math.max(3, Math.floor(fontSize * 0.15)); ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                                ctx.strokeText(text, x, y); ctx.fillStyle = 'rgba(255, 255, 255, 1)'; ctx.fillText(text, x, y);
                            }
                        }
                        setImageEditorModal(prev => ({ ...prev, currentUrl: canvas.toDataURL('image/jpeg', 0.9) }));
                        showToast(type === 'watermark' ? '✨ Đã đóng dấu thành công!' : '✨ Đã làm đẹp màu sắc! Bấm lưu để áp dụng.');

                            if (user && db && api.deleteDoc) {
                                try {

                    const updatedPost = { ...post };

                    setFormData({
                        ...updatedPost, imageUrls: updatedPost.imageUrls || [], internalInfo: updatedPost.internalInfo || '',
                        content1: updatedPost.content1 || updatedPost.content || '', content2: updatedPost.content2 || '', content3: updatedPost.content3 || '',
                        surveyImages: updatedPost.surveyImages || [], surveyNotes: updatedPost.surveyNotes || ''

                const handleMultipleImageUpload = async (e) => {
                    const files = Array.from(e.target.files); if (!files.length) return;
                    const newImagesBase64 = await Promise.all(files.map(compressImage));
                    setFormData(prev => ({ ...prev, imageUrls: [...(prev.imageUrls || []), ...newImagesBase64] }));

                const removeUploadedImage = (indexToRemove) => {
                    setFormData(prev => ({ ...prev, imageUrls: prev.imageUrls.filter((_, index) => index !== indexToRemove) }));

                const groupedData = (postingGroups || []).reduce((acc, g) => {
                    try {
                        if (!g) return acc;
                        const safeName = (typeof g.name === 'string' && g.name.trim() !== '') ? g.name.trim() : 'Group chưa đặt tên';
                        const match = safeName.match(/^\[(.*?)\]\s*(.*)/);
                        const category = (match && match[1]) ? match[1].trim() : 'Khu Vực Khác';
                        const displayName = (match && match[2]) ? match[2].trim() : safeName;

                        if (!acc[category]) acc[category] = [];
                        acc[category].push({ ...g, displayName: displayName || 'Group không tên' });
                    } catch(e) {
                        if (!acc['Lỗi Dữ Liệu']) acc['Lỗi Dữ Liệu'] = [];
                        acc['Lỗi Dữ Liệu'].push({ ...g, displayName: 'Dữ liệu hỏng' });

                            </div>

                                                    </label>

                                </div>

                                    <button onClick={() => setVideoLinkModal({ show: false, url: '' })} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all">Đóng</button>

                            </div>

                        {smartCopyModal.show && (
                            <div className="fixed inset-0 z-[80] bg-gray-900/60 backdrop-blur flex items-center justify-center p-4 animate-[fade-in_0.2s_ease-out]">
                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 text-center border border-indigo-50">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                        <i className="fa-solid fa-copy"></i>
                                    </div>
                                    <h3 className="text-xl font-extrabold text-gray-900 mb-2">Đã Copy Nội Dung!</h3>
                                    <p className="text-gray-500 text-sm mb-5 leading-relaxed px-2">Bài viết đã được lưu vào bộ nhớ tạm (Sẵn sàng <b>Ctrl + V</b>). <br/><br/>
                                        <span className="text-amber-600 bg-amber-50 px-2 py-1.5 rounded-md text-xs font-semibold block mt-1 border border-amber-100">⚠️ Vui lòng tải file xuống máy để đính kèm vào bài đăng!</span>
                                    </p>
                                    <div className="flex flex-col gap-3">
                                        {smartCopyModal.post?.videoUrl ? (
                                            <button onClick={() => executeDownload('video')} className="w-full py-3 bg-pink-50 hover:bg-pink-100 text-pink-600 font-bold rounded-xl flex items-center justify-center gap-2 transition-colors border border-pink-200">
                                                <i className="fa-solid fa-download"></i> Tải Video về máy

                                                <i className="fa-solid fa-images"></i> Tải Album Ảnh về máy

                                        <button onClick={() => setSmartCopyModal({ show: false, text: '', post: null })} className="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">Đóng cửa sổ</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {downloadModal.show && (
                            <div className="fixed inset-0 z-[80] bg-gray-900/60 backdrop-blur flex items-center justify-center p-4 animate-[fade-in_0.2s_ease-out]">
                                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 text-center border border-indigo-50">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                        <i className="fa-solid fa-download"></i>

                        )}

                        <header className="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-10">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-20 flex items-center justify-between">
                                <div className="flex items-center gap-2 sm:gap-3 text-indigo-600">
                                    <div className="bg-indigo-50 p-2 sm:p-2.5 rounded-xl"><i className="fa-solid fa-wand-magic-sparkles text-xl sm:text-2xl"></i></div>
                                    <span className="text-xl sm:text-2xl font-extrabold tracking-tight">AI Scribe <span className="text-gray-400 font-medium text-base sm:text-lg">Pro</span></span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setShowFbConfig(true)} className="p-2 sm:p-2.5 text-gray-500 hover:bg-gray-100 rounded-full mr-2"><i className="fa-solid fa-gear text-lg"></i></button>
                                    <nav className="flex gap-2 sm:gap-3">
                                        <button onClick={() => setCurrentView('groups')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl font-bold ${currentView === 'groups' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-share-nodes"></i><span className="hidden sm:inline"> Đăng tin</span></button>
                                        <button onClick={() => setCurrentView('list')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl font-bold ${currentView === 'list' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-list"></i><span className="hidden sm:inline"> Kho bài</span></button>
                                        <button onClick={handleCreateNew} className={`flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl font-bold ${currentView === 'editor' ? 'bg-indigo-600 text-white' : 'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-plus"></i><span className="hidden sm:inline"> Tạo mới</span></button>
                                    </nav>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6 sm:py-10">

                            {currentView === 'groups' && (
                                <div className="animate-[fade-in_0.3s_ease-out]">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-4">
                                        <div><h1 className="text-2xl sm:text-3xl font-extrabold text-gray-900">Mạng lưới Đăng tin</h1><p className="text-gray-500 mt-1 font-medium">Theo dõi các Hội Nhóm đã rải link.</p></div>
                                        <div className="flex flex-wrap justify-end gap-2 w-full sm:w-auto">
                                            <button onClick={importDefaultGroups} className="bg-emerald-50 text-emerald-700 px-4 py-2.5 rounded-xl font-bold flex-1 sm:flex-none"><i className="fa-solid fa-cloud-arrow-down"></i> Nạp 17 Group</button>
                                            <button onClick={resetAllGroups} className="bg-white border text-gray-700 px-4 py-2.5 rounded-xl font-bold flex-1 sm:flex-none"><i className="fa-solid fa-rotate-right"></i> Reset</button>
                                            <button onClick={deleteAllGroups} className="bg-red-50 text-red-600 px-4 py-2.5 rounded-xl font-bold flex-1 sm:flex-none"><i className="fa-solid fa-trash-can"></i> Xóa tất cả</button>
                                            <button onClick={() => setGroupModal({ show: true, mode: 'add', data: { name: '', url: '' } })} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold w-full sm:w-auto"><i className="fa-solid fa-plus"></i> Thêm Nơi đăng</button>
                                        </div>
                                    </div>

                                    {postingGroups.length === 0 ? (
                                        <div className="bg-white rounded-2xl border border-dashed border-gray-300 p-8 sm:p-16 flex flex-col items-center justify-center text-center shadow-sm">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-4 sm:mb-6">
                                                <i className="fa-solid fa-share-nodes text-3xl sm:text-4xl text-indigo-400"></i>
                                            </div>
                                            <h3 className="text-xl sm:text-2xl font-bold text-gray-900 mb-2">Chưa có danh sách</h3>
                                            <p className="text-gray-500 mb-6 max-w-md text-base sm:text-lg">Bạn có thể tự thêm từng nhóm, hoặc bấm nút Tải nhanh 17 nhóm đã được thiết lập sẵn.</p>
                                            <div className="flex gap-3">
                                                <button onClick={importDefaultGroups} className="text-emerald-600 font-bold text-base hover:text-emerald-800 bg-emerald-50 px-5 py-2.5 rounded-xl transition-colors border border-emerald-100">
                                                    <i className="fa-solid fa-cloud-arrow-down"></i> Nạp tự động
                                                </button>
                                                <button onClick={() => setGroupModal({ show: true, mode: 'add', data: { name: '', url: '' } })} className="text-indigo-600 font-bold text-base hover:text-indigo-800 bg-indigo-50 px-5 py-2.5 rounded-xl transition-colors">
                                                    Thêm thủ công
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-6">
                                            {Object.entries(groupedData).map(([category, groups]) => (
                                                <div key={category} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                                    <h2 className="font-extrabold text-indigo-900 mb-4 border-b-2 border-indigo-50 pb-2 uppercase"><i className="fa-solid fa-map-location-dot"></i> {category}</h2>
                                                    <div className="flex flex-col gap-2">
                                                        {groups.map(group => (
                                                            <div key={group.id || Math.random()} className={`flex justify-between p-3 border rounded-xl group hover:border-indigo-300 ${group.isPosted ? 'bg-emerald-50/50 border-emerald-200' : 'border-gray-200'}`}>
                                                                <div className="flex gap-3 items-center">
                                                                    <button onClick={() => toggleGroupStatus(group)} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${group.isPosted ? 'bg-emerald-500 border-emerald-500 text-white' : 'text-transparent border-gray-300'}`}><i className="fa-solid fa-check text-[10px]"></i></button>
                                                                    <span className={`font-semibold ${group.isPosted ? 'line-through text-gray-400' : 'text-gray-800'}`}>{group.displayName}</span>
                                                                </div>
                                                                <div className="flex gap-2">
                                                                    {group.url && <a href={group.url} target="_blank" onClick={() => toggleGroupStatus(group, true)} className="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-sm font-bold">Mở</a>}
                                                                    <button onClick={() => setGroupModal({ show: true, mode: 'edit', data: group })} className="opacity-0 group-hover:opacity-100 w-7 h-7 text-gray-500 hover:bg-gray-100 rounded-md"><i className="fa-solid fa-pen text-xs"></i></button>
                                                                    <button onClick={() => handleDeleteGroup(group.id)} className="opacity-0 group-hover:opacity-100 w-7 h-7 text-red-500 hover:bg-red-50 rounded-md"><i className="fa-solid fa-trash text-xs"></i></button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {currentView === 'list' && (
                                <div>
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 sm:mb-8 gap-4">
                                        <div><h1 className="text-2xl sm:text-3xl font-extrabold text-gray-900">Chiến dịch của bạn</h1></div>
                                        <button onClick={handleCreateNew} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold"><i className="fa-solid fa-plus"></i> Bắt đầu soạn bài</button>
                                    </div>

                                    {posts.length === 0 ? (
                                        <div className="bg-white rounded-2xl border border-dashed border-gray-300 p-8 sm:p-16 flex flex-col items-center justify-center text-center shadow-sm">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-4 sm:mb-6">
                                                <i className="fa-solid fa-wand-magic-sparkles text-3xl sm:text-4xl text-indigo-400"></i>
                                            </div>
                                            <h3 className="text-xl sm:text-2xl font-bold text-gray-900 mb-2">Chưa có dữ liệu</h3>
                                            <button onClick={handleCreateNew} className="text-indigo-600 font-bold text-base sm:text-lg hover:text-indigo-800 flex items-center gap-2 bg-indigo-50 px-5 py-2.5 rounded-xl">
                                                Trải nghiệm ngay <i className="fa-solid fa-arrow-right"></i>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                                            {posts.map(post => {
                                                const images = post.imageUrls && post.imageUrls.length > 0 ? post.imageUrls : (post.imageUrl ? [post.imageUrl] : []);
                                                const coverImage = images[0];
                                                const extraImagesCount = images.length - 1;

                                                const currentTab = activePostTabs[post.id] || 1;
                                                const currentContent = post[`content${currentTab}`] || post.content || '';
                                                const surveyCount = post.surveyImages?.length || 0;

                                                return (
                                                    <div key={post.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col relative group">

                                                        {surveyCount > 0 && (
                                                            <div className="absolute top-3 left-3 z-10 bg-emerald-500 text-white px-2.5 py-1 rounded-lg text-xs font-extrabold shadow-md flex items-center gap-1.5">
                                                                <i className="fa-solid fa-camera-retro"></i> {surveyCount} Ảnh Khảo sát
                                                            </div>
                                                        )}

                                                        <div className="relative w-full h-48 bg-gray-50 border-b border-gray-100 rounded-t-2xl overflow-hidden">
                                                            {images[0] ? <img src={images[0]} className="w-full h-full object-cover" /> : <div className="w-full h-full flex justify-center items-center text-gray-300"><i className="fa-regular fa-image text-4xl"></i></div>}
                                                        </div>

                                                        <div className="p-5 flex-1 flex flex-col">
                                                            <h3 className="text-lg font-bold text-gray-900 line-clamp-2 mb-3">{post.title}</h3>

                                                            {post.internalInfo && (
                                                                <div className="mb-3 bg-amber-50 border border-amber-200 rounded-lg p-3">
                                                                    <div className="text-amber-700 font-extrabold text-xs mb-1"><i className="fa-solid fa-lock"></i> NỘI BỘ</div>
                                                                    <div className="text-xs text-amber-900 max-h-24 overflow-y-auto whitespace-pre-wrap">{post.internalInfo}</div>
                                                                </div>
                                                            )}

                                                            {(post.content1 || post.content2 || post.content3) && (
                                                                <div className="flex gap-1 mb-3 bg-gray-50 p-1 rounded-lg">
                                                                    {[1,2,3].map(t => <button key={t} onClick={() => setActivePostTabs(prev => ({...prev, [post.id]: t}))} className={`flex-1 py-1 text-[10px] font-bold rounded-md ${currentTab === t ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500'}`}>{t===1?'Chuyên nghiệp':t===2?'Kể chuyện':'Ngắn gọn'}</button>)}
                                                                </div>
                                                            )}

                                                            <p className="text-sm text-gray-500 line-clamp-3 mb-4 flex-1">{currentContent}</p>

                                                            <div className="flex items-center justify-between pt-4 border-t border-gray-100">
                                                                <span className="text-xs text-gray-400 font-medium"><i className="fa-regular fa-clock"></i> {post.date}</span>
                                                                <div className="flex gap-1">

                                                                    <button onClick={() => setSurveyModal({ show: true, post: post })} className="p-2 text-emerald-600 bg-emerald-50 hover:bg-emerald-600 hover:text-white rounded-xl font-bold" title="Khảo sát thực tế">
                                                                        <i className="fa-solid fa-map-location-dot"></i>
                                                                    </button>

                                                                    {post.videoUrl && <a href={post.videoUrl} target="_blank" className="p-2 text-pink-600 bg-pink-50 hover:bg-pink-600 hover:text-white rounded-xl"><i className="fa-solid fa-play"></i></a>}
                                                                    <button onClick={() => handleGenerateVideo(post, currentContent)} disabled={generatingVideoId === post.id} className="p-2 text-purple-600 bg-purple-50 hover:bg-purple-600 hover:text-white rounded-xl">
                                                                        {generatingVideoId === post.id ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-video"></i>}
                                                                    </button>
                                                                    <button onClick={() => { if (post.videoUrl) setPostOptionsModal({ show: true, post: post, selectedContent: currentContent }); else handlePostToFacebook(post, 'image', currentContent); }} disabled={postingFbId === post.id} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-600 hover:text-white rounded-xl">
                                                                        {postingFbId === post.id ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-brands fa-facebook-f"></i>}
                                                                    </button>
                                                                    <button onClick={() => setDownloadModal({ show: true, post: post })} className="p-2 text-gray-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl"><i className="fa-solid fa-download"></i></button>
                                                                    <button onClick={() => copyTextOnly(currentContent, 'Đã copy đoạn mô tả!')} className="p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl"><i className="fa-solid fa-copy"></i></button>
                                                                    <button onClick={() => handleEdit(post)} className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl"><i className="fa-solid fa-pen"></i></button>
                                                                    <button onClick={() => handleDelete(post.id)} className="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-xl"><i className="fa-solid fa-trash"></i></button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}

                            {currentView === 'editor' && (
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex flex-col sm:flex-row justify-between items-center mb-8 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <h1 className="text-2xl font-extrabold text-gray-900">{formData.id && posts.find(p => p.id === formData.id) ? 'Sửa bài' : 'Tạo mới'}</h1>
                                        <div className="flex gap-3">
                                            <button onClick={() => setCurrentView('list')} className="px-5 py-2.5 bg-gray-50 text-gray-600 font-bold rounded-xl hover:bg-gray-100">Hủy</button>
                                            <button onClick={handleSavePost} className="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200"><i className="fa-solid fa-floppy-disk"></i> Lưu</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {/* TRÁI */}
                                        <div className="flex flex-col gap-6">
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                                <label className="block text-lg font-bold mb-2">Tên chiến dịch</label>
                                                <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} className="w-full p-4 bg-gray-50 rounded-xl outline-none" />
                                            </div>
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex-1 flex flex-col">
                                                <div className="flex justify-between items-center mb-4">
                                                    <label className="text-lg font-bold">Dữ liệu thô (AI đọc)</label>
                                                    <div className="relative">
                                                        <input type="file" accept="image/*" id="rawImageInput" className="hidden" onChange={handleRawImageUpload} />
                                                        <label htmlFor="rawImageInput" className="cursor-pointer text-white bg-gray-800 px-4 py-2 rounded-xl font-bold"><i className="fa-solid fa-camera"></i> Tải ảnh</label>
                                                    </div>
                                                </div>
                                                {formData.rawImage && (
                                                    <div className="relative mb-4 inline-block"><img src={formData.rawImage} className="h-32 rounded-xl object-cover" /><button onClick={() => setFormData(prev => ({...prev, rawImage: ''}))} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full"><i className="fa-solid fa-xmark text-xs"></i></button></div>
                                                )}
                                                <textarea value={formData.rawText} onChange={(e) => setFormData({...formData, rawText: e.target.value})} className="w-full p-4 bg-gray-50 rounded-xl outline-none min-h-[150px] mb-4" placeholder="Dán thông số hoặc nội dung lộn xộn vào đây..."></textarea>

                                                <div className="bg-amber-50 p-4 rounded-xl">
                                                    <label className="text-sm font-bold text-amber-800 mb-2 block"><i className="fa-solid fa-lock"></i> Nội bộ (Ẩn)</label>
                                                    <textarea value={formData.internalInfo} onChange={(e) => setFormData({...formData, internalInfo: e.target.value})} className="w-full p-3 bg-white rounded-lg outline-none min-h-[100px] text-sm text-amber-900"></textarea>
                                                </div>

                                                <button onClick={handleGenerateAI} disabled={isGenerating} className="mt-6 w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200">
                                                    {isGenerating ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-wand-magic-sparkles"></i> Phân tích bằng AI</>}
                                                </button>
                                            </div>
                                        </div>

                                        {/* PHẢI */}
                                        <div className="flex flex-col gap-6">
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col flex-1">
                                                <div className="flex justify-between items-center mb-4">
                                                    <label className="text-lg font-bold"><i className="fa-brands fa-facebook text-blue-600"></i> Đăng Facebook</label>
                                                    <button onClick={() => copyTextOnly(formData[`content${editorTab}`] || formData.content, 'Đã copy!')} className="px-3 py-1.5 bg-indigo-50 text-indigo-700 font-bold rounded-lg text-sm"><i className="fa-solid fa-copy"></i> Copy</button>
                                                </div>
                                                <div className="flex gap-2 mb-4 bg-gray-50 p-1.5 rounded-xl">
                                                    {[1,2,3].map(t => <button key={t} onClick={() => setEditorTab(t)} className={`flex-1 py-2 text-sm font-bold rounded-lg ${editorTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500'}`}>{t===1?'Chuyên nghiệp':t===2?'Kể chuyện':'Ngắn gọn'}</button>)}
                                                </div>
                                                <textarea value={formData[`content${editorTab}`] || formData.content || ''} onChange={(e) => { const val = e.target.value; setFormData(prev => ({ ...prev, [`content${editorTab}`]: val, ...(editorTab === 1 ? { content: val } : {}) })); }} className="w-full p-5 bg-gray-50 rounded-xl outline-none flex-1 min-h-[250px]"></textarea>
                                            </div>

                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                                <div className="flex justify-between items-center mb-4">
                                                    <label className="text-lg font-bold">Ảnh Facebook (Public)</label>
                                                    <div className="relative"><input type="file" multiple accept="image/*" id="multiImageInput" className="hidden" onChange={handleMultipleImageUpload} /><label htmlFor="multiImageInput" className="cursor-pointer bg-gray-100 px-4 py-2 rounded-xl font-bold text-sm"><i className="fa-solid fa-plus"></i> Thêm</label></div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3">
                                                    {formData.imageUrls.map((url, index) => (
                                                        <div key={index} className="relative rounded-xl overflow-hidden aspect-square group">
                                                            <img src={url} className="w-full h-full object-cover" />
                                                            <button onClick={(e) => { e.preventDefault(); openImageEditor(index); }} className="absolute top-2 right-10 bg-indigo-500 text-white w-7 h-7 rounded-lg"><i className="fa-solid fa-wand-magic-sparkles text-xs"></i></button>
                                                            <button onClick={() => removeUploadedImage(index)} className="absolute top-2 right-2 bg-red-500 text-white w-7 h-7 rounded-lg"><i className="fa-solid fa-trash text-xs"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            const startReactApp = () => {
                const rootElement = document.getElementById('root');
                try {
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(<App />);
                } catch (err) {
                    console.error("Lỗi:", err);
                    rootElement.innerHTML = `<div style="padding: 20px; color: red;"><h3>⚠️ Lỗi:</h3><p>${err.message}</p></div>`;
                }
            };

            if (window.FirebaseAPI) { startReactApp(); }
            else { window.addEventListener('firebase-loaded', startReactApp); setTimeout(startReactApp, 1000); }
        };

        initApp();
    </script>
</body>
</html>
